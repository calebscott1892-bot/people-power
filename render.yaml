services:
  - type: web
    name: people-power-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: npm --prefix Server ci
    startCommand: npm --prefix Server start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_PUBLIC_STORAGE_BASE
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: REPORT_EMAIL_FROM
        sync: false
      - key: REPORT_EMAIL_REPLY_TO
        sync: false

  - type: web
    name: people-power-web
    runtime: static
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_BACKEND_BASE
        sync: false
      - key: VITE_SITE_URL
        sync: false
